name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: GitHub Actions
          user_email: andrewew98@gmail..com
          commit_message: "Deploy to GitHub Pages"
          # The default branch is 'gh-pages', but you can specify a different branch if needed
          # target_branch: gh-pages
          # The default folder is 'dist', but you can specify a different folder if needed
          # publish_dir: ./dist
          # The default is 'true', but you can set it to 'false' if you don't want to create a CNAME file
          # cname: true
          # The default is 'true', but you can set it to 'false' if you don't want to create a .nojekyll file
          # nojekyll: true